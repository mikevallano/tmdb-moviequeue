language: ruby
rvm:
 - 2.2.2
services:
 - postgresql
addons:
 postgresql: "9.3"
 # firefox: latest
 chrome: stable
 code_climate:
  repo_token: ENV["code_climate_repo_token"]
  before_install:
    # Install geckodriver
    # - wget https://github.com/mozilla/geckodriver/releases/download/v0.18.0/geckodriver-v0.19.0-linux64.tar.gz
    # - mkdir geckodriver
    # - tar -xzf geckodriver*.tar.gz -C geckodriver
    # - export PATH=$PATH:$PWD/geckodriver

    - google-chrome-stable --headless --disable-gpu http://localhost &

    # # Install Chrome driver
    - wget http://chromedriver.storage.googleapis.com/2.32/chromedriver_linux64.zip
    - unzip chromedriver_linux64.zip
    - sudo chmod u+x chromedriver
    - sudo mv chromedriver /usr/bin/
    - export PATH=$PATH:$PWD/chromedriver

    # # For selenium in headless linux system, But no need when PhantomJS
    # - "export DISPLAY=:99.0"
    # - "export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/"
    # - "/sbin/start-stop-daemon --start --quiet --pidfile /tmp/rspec_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -ac -screen 0 1280x1024x16"
    # - sleep 3 # give xvfb some time to start
before_script:
  - google-chrome-stable --version
  - psql -c 'create database travis_ci_test;' -U postgres
  - export DISPLAY=:99.0
  - sh -e /etc/init.d/xvfb start

script:
  - bundle exec rake db:setup
  - bundle exec rspec

